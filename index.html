<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Controle de Despesas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-theme-color" content="#0f172a">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container" id="app">
    <!-- Setup Screen -->
    <section class="setup-screen" id="setupScreen">
      <div class="glass-card">
        <h1>Bem-vindo!</h1>
        <p>Defina o valor fixo inicial para começarmos a controlar seus gastos.</p>
        <div class="input-group">
          <input type="number" id="initialValueInput" placeholder="Ex: 5000.00" inputmode="decimal">
        </div>
        <button id="btnSetInitialValue" class="btn-primary">Iniciar Aplicativo</button>
      </div>
    </section>

    <!-- Main App Screen -->
    <section class="main-screen hidden" id="mainScreen">
      <header class="header">
        <div class="balance-card">
          <span class="label">Saldo Atual</span>
          <h2 id="currentBalanceDisplay">R$ 0,00</h2>
          <div class="fixed-value-badge">
             Valor Fixo: <span id="fixedValueDisplay">R$ 0,00</span>
          </div>
        </div>
      </header>

      <main class="content">
        <!-- Add Transaction Card -->
        <div class="add-expense-card">
          <div class="transaction-type-toggle">
            <button id="btnTypeExpense" class="type-btn active" data-type="expense">Despesa</button>
            <button id="btnTypeIncome" class="type-btn" data-type="income">Crédito</button>
          </div>
          
          <div class="input-row">
            <div class="input-group-row">
              <input type="text" id="expenseDescInput" placeholder="Descrição (Opcional)">
              <input type="number" id="expenseValueInput" placeholder="Valor (R$)" inputmode="decimal">
            </div>
            
            <div class="input-group-row">
              <input type="date" id="transactionDateInput">
              <select id="expenseCategoryInput">
                <option value="Carro">🚗 Carro</option>
                <option value="Mercado">🛒 Mercado</option>
                <option value="Padaria">🥖 Padaria</option>
                <option value="Farmacia">💊 Farmácia</option>
                <option value="Cerveja">🍺 Cerveja</option>
                <option value="Alimentação">🍽️ Alimentação</option>
                <option value="Café">☕ Café</option>
                <option value="Compras">🛍️ Compras</option>
                <option value="Outros" selected>🏷️ Outros</option>
              </select>
            </div>
          </div>
          <button id="btnAddExpense" class="btn-secondary">Confirmar Lançamento</button>
        </div>

        <!-- Stats Section -->
        <div class="stats-card hidden" id="statsCard">
          <h3>Estatísticas de Despesas</h3>
          <div class="chart-container">
            <canvas id="categoryChart"></canvas>
          </div>
          <div class="stats-summary">
            <div class="stat-box">
              <span class="stat-label">Total Créditos</span>
              <span class="stat-val text-success" id="totalIncomeDisplay">R$ 0,00</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Total Despesas</span>
              <span class="stat-val text-danger" id="totalExpensesDisplay">R$ 0,00</span>
            </div>
          </div>
        </div>

        <div class="expenses-list-container">
          <h3>Histórico de Transações</h3>
          <ul class="expenses-list" id="expensesList">
            <!-- Items injected by JS -->
          </ul>
        </div>
      </main>

      <footer class="footer">
        <button id="btnResetApp" class="btn-danger">Reiniciar Aplicativo</button>
      </footer>
    </section>
  </div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('ServiceWorker registrou com sucesso:', reg.scope);
        }).catch(err => {
          console.log('Falha no ServiceWorker:', err);
        });
      });
    }
  </script>
</body>
</html>
